name: deploy-worker

on:
  push:
    tags:
      - 'worker-v*'
  workflow_dispatch:
    inputs:
      environment:
        description: target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Build admin SPA
        run: pnpm --filter @mterminal/admin build

      - name: Deploy worker
        run: pnpm --filter @mterminal/worker exec wrangler deploy --env "$DEPLOY_ENV"

      - name: Smoke test
        id: smoke
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            url="https://marketplace.mterminal.app/healthz"
          else
            url="https://staging.marketplace.mterminal.app/healthz"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          curl -fsS --retry 5 --retry-delay 3 "$url"

      - name: Notify success
        if: success() && vars.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST -H 'content-type: application/json' \
            -d "{\"text\":\":rocket: marketplace deploy ok ($DEPLOY_ENV) — ${GITHUB_SHA::7}\"}" \
            "${{ vars.DEPLOY_WEBHOOK_URL }}"

      - name: Notify failure
        if: failure() && vars.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST -H 'content-type: application/json' \
            -d "{\"text\":\":x: marketplace deploy FAILED ($DEPLOY_ENV) — ${GITHUB_SHA::7}\"}" \
            "${{ vars.DEPLOY_WEBHOOK_URL }}"
